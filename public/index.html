<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="3" y1="4" x2="15" y2="4"/>
        <line x1="3" y1="9" x2="15" y2="9"/>
        <line x1="3" y1="14" x2="15" y2="14"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <svg class="topbar-logo" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
      <h1 class="topbar-title">Markdown Viewer</h1>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">Documents</span>
        <div class="sort-controls">
          <button class="sort-btn active" id="sortName" title="Sort by name">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 6h12M3 12h9M3 18h6"/>
            </svg>
            <span>Name</span>
            <span class="sort-arrow">&uarr;</span>
          </button>
          <button class="sort-btn" id="sortTime" title="Sort by time">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>Time</span>
            <span class="sort-arrow"></span>
          </button>
        </div>
      </div>
      <nav class="file-tree" id="fileTree"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="content" id="content">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <h2>Markdown Viewer</h2>
        <p>Select a document from the sidebar to start reading</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
  <script src="/js/tree.js"></script>
  <script src="/js/viewer.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
