<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="4" y1="6" x2="20" y2="6"/>
        <line x1="4" y1="12" x2="20" y2="12"/>
        <line x1="4" y1="18" x2="20" y2="18"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <svg class="topbar-logo" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="9" y1="13" x2="15" y2="13"/>
        <line x1="9" y1="17" x2="13" y2="17"/>
      </svg>
      <h1 class="topbar-title">Markdown Viewer</h1>
    </div>
    <div class="topbar-actions">
      <button class="topbar-btn" id="uploadBtn" title="Upload file">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span>Upload</span>
      </button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">Documents</span>
      </div>
      <div class="sidebar-toolbar">
        <div class="search-box">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Search files...">
          <button class="search-clear" id="searchClear" title="Clear">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="sort-controls">
          <button class="sort-btn active" id="sortName" title="Sort by name">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M3 6h12M3 12h9M3 18h6"/>
            </svg>
            <span>Name</span>
            <span class="sort-arrow">&uarr;</span>
          </button>
          <button class="sort-btn" id="sortTime" title="Sort by time">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>Time</span>
            <span class="sort-arrow"></span>
          </button>
        </div>
      </div>
      <nav class="file-tree" id="fileTree"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <main class="content" id="content">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <h2>Markdown Viewer</h2>
        <p>Select a document from the sidebar to start reading</p>
      </div>
    </main>
  </div>

  <!-- Upload Modal -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Upload Markdown File</h3>
        <button class="modal-close" id="uploadModalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">File</label>
          <div class="file-drop-zone" id="fileDropZone">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="file-drop-text">Click or drag .md file here</p>
            <p class="file-drop-name" id="fileDropName"></p>
            <input type="file" id="fileInput" accept=".md,.markdown" hidden>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Directory (optional)</label>
          <input type="text" class="form-input" id="uploadDir" placeholder="e.g. notes/2024">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="uploadPassword" placeholder="Enter upload password">
        </div>
        <div class="form-message" id="uploadMessage"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="uploadCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="uploadSubmitBtn">Upload</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Delete File</h3>
        <button class="modal-close" id="deleteModalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="delete-hint">This file will be moved to the trash directory, not permanently deleted.</p>
        <p class="delete-filename" id="deleteFilename"></p>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="deletePassword" placeholder="Enter password to confirm">
        </div>
        <div class="form-message" id="deleteMessage"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
        <button class="btn btn-danger" id="deleteSubmitBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/common.min.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
